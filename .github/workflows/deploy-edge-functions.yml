name: Deploy Supabase Edge Functions

# Redéploie automatiquement les Edge Functions à chaque push sur main
# qui modifie le dossier supabase/functions/. Fini le copier-coller manuel.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {} # permet aussi un déclenchement manuel depuis l'onglet Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: fmhsohrgbznqmcvqktjw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy admin-assistant (et autres fonctions)
        run: |
          supabase functions deploy admin-assistant \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt=false
