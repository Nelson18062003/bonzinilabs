project_id = "fmhsohrgbznqmcvqktjw"

# generate-flyer serves public rate data — no auth needed.
# Without verify_jwt = false, Supabase rejects the CORS OPTIONS preflight
# with a 401 before the function code is even reached.
[functions.generate-flyer]
verify_jwt = false

# resend-events receives Resend webhooks (external, no Supabase JWT).
# Authenticity is enforced via Svix signature verification inside the function.
[functions.resend-events]
verify_jwt = false

# send-email is driven by pg_cron via pg_net (no Supabase user JWT).
# Authenticity is enforced via the mandatory EMAIL_DRAINER_SECRET bearer check
# inside the function (constant-time compare).
[functions.send-email]
verify_jwt = false